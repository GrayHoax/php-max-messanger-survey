##############################################
#  Конфигурация опросов обратной связи
#  Формат: YAML
#  Поддерживаемые типы вопросов:
#    text    - произвольный текст
#    rating  - числовая оценка (задаётся min/max)
#    choice  - выбор из вариантов (кнопки)
#    boolean - да/нет (кнопки)
#    email   - e-mail с валидацией формата
#    phone   - номер телефона через кнопку "Поделиться контактом"
##############################################

author:
    name: "GrayHoax"
    email: "grayhoax@proton.me"
    github: "https://github.com/GrayHoax"

surveys:

    # -----------------------------------------------
    # Пример 1: Обратная связь после мероприятия
    # Запуск: /start  или  /start event_feedback
    # -----------------------------------------------
    event_feedback:
        name: "Обратная связь о мероприятии"
        description: "Помогите нам стать лучше — ответьте на несколько вопросов"
        start_message: |
            Спасибо, что посетили наше мероприятие! 🙏
            Нам важно ваше мнение. Пожалуйста, уделите минуту и ответьте на несколько вопросов.
        end_message: |
            Большое спасибо за обратную связь! 🎉
            Ваши ответы помогут нам сделать следующие мероприятия ещё лучше.
        questions:
            -   id: overall_rating
                type: rating
                text: "Как бы вы оценили мероприятие в целом?"
                min: 1
                max: 10
                required: true
                error_message: "Пожалуйста, введите число от 1 до 10"

            -   id: content_quality
                type: choice
                text: "Как вы оцениваете качество контента?"
                choices:
                    - "Отлично"
                    - "Хорошо"
                    - "Удовлетворительно"
                    - "Плохо"
                required: true

            -   id: speaker_rating
                type: rating
                text: "Оцените выступление спикера(ов)"
                min: 1
                max: 5
                required: true
                error_message: "Пожалуйста, введите число от 1 до 5"

            -   id: would_recommend
                type: boolean
                text: "Порекомендовали бы вы это мероприятие друзьям или коллегам?"
                required: true

            -   id: improvements
                type: text
                text: "Что можно улучшить? (необязательно)"
                required: false
                skip_label: "Пропустить"

            -   id: email
                type: email
                text: "Укажите ваш e-mail для получения материалов мероприятия (необязательно)"
                required: false
                skip_label: "Пропустить"
                error_message: "Введите корректный e-mail адрес"

            -   id: phone
                type: phone
                text: "Поделитесь номером телефона, чтобы мы могли с вами связаться (необязательно)"
                required: false
                skip_label: "Пропустить"

    # -----------------------------------------------
    # Пример 2: Обратная связь после обучения
    # Запуск: /start training_feedback
    # -----------------------------------------------
    training_feedback:
        name: "Обратная связь после обучения"
        description: "Оцените пройденный курс или тренинг"
        start_message: |
            Поздравляем с завершением обучения! 🎓
            Расскажите, как прошло — это займёт не более 2 минут.
        end_message: |
            Ваши ответы получены. Спасибо! 💪
            Мы учтём ваше мнение при подготовке следующих программ.
        questions:
            -   id: knowledge_gained
                type: rating
                text: "Насколько полезными оказались полученные знания? (1–10)"
                min: 1
                max: 10
                required: true
                error_message: "Пожалуйста, введите число от 1 до 10"

            -   id: material_clarity
                type: choice
                text: "Насколько понятно был изложен материал?"
                choices:
                    - "Всё понятно"
                    - "В основном понятно"
                    - "Местами непонятно"
                    - "Сложно для восприятия"
                required: true

            -   id: will_apply
                type: boolean
                text: "Планируете ли вы применять полученные знания на практике?"
                required: true

            -   id: suggestions
                type: text
                text: "Что добавить или изменить в программе обучения? (необязательно)"
                required: false
                skip_label: "Пропустить"

            -   id: email
                type: email
                text: "E-mail для получения дополнительных материалов (необязательно)"
                required: false
                skip_label: "Пропустить"
                error_message: "Введите корректный e-mail адрес"

    # -----------------------------------------------
    # Пример 3: Обратная связь после встречи
    # Запуск: /start meeting_feedback
    # -----------------------------------------------
    meeting_feedback:
        name: "Обратная связь после встречи"
        description: "Краткая оценка прошедшей встречи или совещания"
        start_message: "Как прошла встреча? Поделитесь мнением:"
        end_message: "Спасибо за отзыв! До следующей встречи 👋"
        questions:
            -   id: meeting_rating
                type: rating
                text: "Оцените встречу (1–5)"
                min: 1
                max: 5
                required: true
                error_message: "Пожалуйста, введите число от 1 до 5"

            -   id: goals_achieved
                type: boolean
                text: "Были ли достигнуты цели встречи?"
                required: true

            -   id: comments
                type: text
                text: "Комментарии или предложения (необязательно)"
                required: false
                skip_label: "Пропустить"

            -   id: phone
                type: phone
                text: "Оставьте контакт для уточнений (необязательно)"
                required: false
                skip_label: "Пропустить"
