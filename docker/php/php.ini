; MaxBot Feedback — PHP runtime settings

[PHP]
display_errors       = Off
log_errors           = On
error_log            = /var/log/php/error.log
error_reporting      = E_ALL
max_execution_time   = 30
memory_limit         = 128M
post_max_size        = 8M
upload_max_filesize  = 8M

[Date]
date.timezone        = Europe/Moscow
