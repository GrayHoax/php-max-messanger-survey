server {
    listen      80;
    server_name _;
    root        /var/www/html/public;
    index       index.php;

    # Webhook endpoint (POST only)
    location = /webhook {
        try_files $uri /index.php$is_args$args;
    }

    location / {
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Security headers
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
    }

    # Block access to hidden files and sensitive directories
    location ~ /\. {
        deny all;
    }

    location ~* \.(env|yaml|yml|json|lock|sqlite|db)$ {
        deny all;
    }

    access_log /var/log/nginx/maxbot_access.log;
    error_log  /var/log/nginx/maxbot_error.log;
}
